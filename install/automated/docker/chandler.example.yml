chandler:
    debug: true
    websiteUrl: null
    rootApp:    "openvk"
    
    preferences:
        appendExtension: "xhtml"
        # Prefer firewalling this path in production; keep exposeChandler false
        adminUrl: "/chandlerd"
        exposeChandler: false
        logs:
            enabled: true
            entitiesNamespace: "openvk\\Web\\Models\\Entities\\"
    
    extensions:
        path: null
        allEnabled: false
    
    database:
        dsn: "mysql:host=mariadb-primary;dbname=db"
        user: "openvk"
        password: "openvk"
    
    security:
        # MUST be unique per deployment — do not reuse example secrets
        secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
        csrfProtection: "strict"
        extendedValidation: false
        sessionDuration: 14

    email:
        host: "mail.example.com"
        port: 465
        user: "user"
        pass: "word"
        addr: "noreply@example.com"
        ssl: true
